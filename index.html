<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title> Imersão Dev Alura - Aula 01</title>
</head>

<body>
    <div class="container">
        <h1 class="page-title">
            Calculadora de média</h1>
        <p class="page-subtitle">
            Descubra qual a sua média de nota de todas as provas!
        </p>
        <img src="https://www.alura.com.br/assets/img/imersoes/dev-2021/logo-imersao-conversor-de-moedas.svg"
            class="page-logo" alt="">
        <div class="fundo">
            <img src="midia/pexels-cottonbro-5184951.jpg" class="imgfundo" alt="">
            <p class="textonota1">
                Nota 01.
            </p>
            <input id="nota1" type="number" size="2" min="0" max="10">
            <p class="textonota2">
                Nota 02.
            </p>
            <input id="nota2" type="number" size="2" min="0" max="10">
            <p class="textonota3">
                Nota 03.
            </p>
            <input id="nota3" type="number" size="2" min="0" max="10">
            <p class="textonota4">
                Nota 04.
            </p>
            <input id="nota4" type="number" size="2" min="0" max="10">

            <button type="submit" onclick="calcular()" id="calcular">Calcular</button>

             <h2 id="result"></h2>

            



            <a href="https://alura.com.br/" target="_blank">
                <img src="https://www.alura.com.br/assets/img/home/alura-logo.svg" alt="" class="alura-logo">
            </a>


            <script>
                    document.getElementById("calcular").onclick = function calcular() {
                    var nota1 = Number(document.getElementById("nota1").value);
                    var nota2 = Number(document.getElementById("nota2").value);
                    var nota3 = Number(document.getElementById("nota3").value);
                    var nota4 = Number(document.getElementById("nota4").value);
                    var media = (nota1 + nota2 + nota3 + nota4) / 4;
                    var mediafixada = media.toFixed(2);
                    
                
                
                if (media >= 7) {
                    var aprovado = document.getElementById('result');
                    var aprovacao = 'Média Final:  ' + mediafixada + 'Você foi aprovado!';
                    aprovado.innerHTML = aprovacao;
                }               
                else {
                    var recuperacao = document.getElementById('result');
                    var recuperar = 'Média Final: ' + mediafixada + ' Vejo você na recuperação.';
                    recuperacao.innerHTML = recuperar;
                }

                
            }

            

            </script>
</body>

</html>
